name: CI

# Typecheck, lint, tests, and generated WASM validation on every push/PR. The
# Pages deploy uses the same strict `npm run build` entry point.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit, strict)
        run: npm run typecheck

      - name: Builder boundary guard
        run: npm run verify:builder-boundaries

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Production build
        run: GH_PAGES=true npm run build

      - name: Builder bundle boundary
        run: npm run verify:builder-bundle

      - name: Install Chromium for browser probes
        run: npx playwright-core install --with-deps chromium

      - name: Builder production lazy-load network probe
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chromium
        run: |
          npm run preview:dist -- --host 127.0.0.1 --port 4173 --base /alchemists-descent/ &
          PREVIEW_PID=$!
          trap "kill $PREVIEW_PID" EXIT
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173/alchemists-descent/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4173/alchemists-descent/ >/dev/null
          npm run verify:builder-prod-network -- http://127.0.0.1:4173/alchemists-descent/

      - name: AssemblyScript WASM generation
        run: |
          npm run build:wasm
          git diff --exit-code -- src/world/virtual/wasm/roundCornersWasm.ts
