name: CI

# Typecheck, lint, tests, and generated WASM validation on every push/PR. The
# Pages deploy uses the same strict `npm run build` entry point.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit, strict)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: AssemblyScript WASM generation
        run: |
          npm run build:wasm
          git diff --exit-code -- src/world/virtual/wasm/roundCornersWasm.ts
